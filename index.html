<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Latham</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a2e3b;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 480px; }
    .monogram {
      width: 64px;
      height: 64px;
      background: #2a7a8c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 auto 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 1rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    a {
      color: #2a7a8c;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="monogram">ML</div>
    <h1>Mark Latham</h1>
    <p>This site is currently being updated. Check back soon.</p>
    <p>In the meantime, reach out at <a href="mailto:mark@markbrucelatham.au">mark@markbrucelatham.au</a></p>
  </div>
</body>
</html>
